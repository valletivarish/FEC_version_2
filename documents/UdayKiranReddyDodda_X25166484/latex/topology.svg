<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1240" height="720" fill="#ffffff"/>

  <!-- defs: arrowheads -->
  <defs>
    <marker id="flow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2b3944"/>
    </marker>
    <marker id="read" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b06a3a"/>
    </marker>
  </defs>

  <!-- EC2 edge host container -->
  <rect x="34" y="52" width="452" height="176" rx="8" fill="none" stroke="#3d5a73" stroke-width="2.5" stroke-dasharray="9 6"/>
  <text x="50" y="44" font-size="17" fill="#3d5a73" font-weight="bold">EC2 edge host  (Docker Compose)</text>

  <!-- Sensor containers -->
  <rect x="54" y="86" width="192" height="112" rx="7" fill="#eaf0f4" stroke="#3d5a73" stroke-width="2"/>
  <text x="150" y="120" font-size="17" fill="#17324d" font-weight="bold" text-anchor="middle">10 Sensor Containers</text>
  <text x="150" y="146" font-size="13.5" fill="#42586b" text-anchor="middle">5 types x 2 berths</text>
  <text x="150" y="167" font-size="13.5" fill="#42586b" text-anchor="middle">bounded random walk,</text>
  <text x="150" y="185" font-size="13.5" fill="#42586b" text-anchor="middle">dual-rate sample/dispatch</text>

  <!-- Fog gateway -->
  <rect x="278" y="86" width="192" height="112" rx="7" fill="#17324d" stroke="#0f2438" stroke-width="2"/>
  <text x="374" y="120" font-size="17" fill="#ffffff" font-weight="bold" text-anchor="middle">Fog Gateway</text>
  <text x="374" y="146" font-size="13.5" fill="#c7d6e2" text-anchor="middle">Java HTTP server</text>
  <text x="374" y="167" font-size="13.5" fill="#c7d6e2" text-anchor="middle">window / aggregate /</text>
  <text x="374" y="185" font-size="13.5" fill="#c7d6e2" text-anchor="middle">threshold rules</text>

  <!-- Amazon SQS -->
  <rect x="560" y="98" width="150" height="90" rx="7" fill="#d1622f" stroke="#a94c22" stroke-width="2"/>
  <text x="635" y="134" font-size="16.5" fill="#ffffff" font-weight="bold" text-anchor="middle">Amazon SQS</text>
  <text x="635" y="158" font-size="13.5" fill="#ffe7d8" text-anchor="middle">spc-berth-agg</text>

  <!-- Processor Lambda -->
  <rect x="782" y="98" width="176" height="90" rx="7" fill="#2e7d6b" stroke="#22604f" stroke-width="2"/>
  <text x="870" y="128" font-size="16.5" fill="#ffffff" font-weight="bold" text-anchor="middle">AWS Lambda</text>
  <text x="870" y="150" font-size="13.5" fill="#d4ede5" text-anchor="middle">spc-processor</text>
  <text x="870" y="170" font-size="12.5" fill="#d4ede5" text-anchor="middle">SQS-triggered ingest</text>

  <!-- DynamoDB -->
  <rect x="1030" y="98" width="176" height="90" rx="7" fill="#17324d" stroke="#0f2438" stroke-width="2"/>
  <text x="1118" y="134" font-size="16.5" fill="#ffffff" font-weight="bold" text-anchor="middle">Amazon DynamoDB</text>
  <text x="1118" y="158" font-size="13.5" fill="#c7d6e2" text-anchor="middle">spc-readings</text>

  <!-- ingest flow arrows -->
  <line x1="470" y1="142" x2="556" y2="142" stroke="#2b3944" stroke-width="2.5" marker-end="url(#flow)"/>
  <line x1="710" y1="142" x2="778" y2="142" stroke="#2b3944" stroke-width="2.5" marker-end="url(#flow)"/>
  <line x1="958" y1="142" x2="1026" y2="142" stroke="#2b3944" stroke-width="2.5" marker-end="url(#flow)"/>

  <!-- query tier -->
  <rect x="782" y="452" width="176" height="96" rx="7" fill="#2e7d6b" stroke="#22604f" stroke-width="2"/>
  <text x="870" y="486" font-size="16.5" fill="#ffffff" font-weight="bold" text-anchor="middle">AWS Lambda</text>
  <text x="870" y="508" font-size="13.5" fill="#d4ede5" text-anchor="middle">spc-dashboard-api</text>
  <text x="870" y="528" font-size="12.5" fill="#d4ede5" text-anchor="middle">record-keyed route map</text>

  <rect x="556" y="457" width="160" height="86" rx="7" fill="#d1622f" stroke="#a94c22" stroke-width="2"/>
  <text x="636" y="493" font-size="16" fill="#ffffff" font-weight="bold" text-anchor="middle">API Gateway</text>
  <text x="636" y="516" font-size="13.5" fill="#ffe7d8" text-anchor="middle">REST API</text>

  <rect x="330" y="457" width="150" height="86" rx="7" fill="#8a9ba8" stroke="#6d7d8a" stroke-width="2"/>
  <text x="405" y="493" font-size="16" fill="#ffffff" font-weight="bold" text-anchor="middle">Amazon S3</text>
  <text x="405" y="516" font-size="13.5" fill="#eef2f5" text-anchor="middle">spc-frontend</text>

  <rect x="96" y="457" width="164" height="86" rx="7" fill="#eaf0f4" stroke="#6d7d8a" stroke-width="2"/>
  <text x="178" y="493" font-size="16" fill="#17324d" font-weight="bold" text-anchor="middle">Browser</text>
  <text x="178" y="516" font-size="13.5" fill="#42586b" text-anchor="middle">terminal dashboard</text>

  <!-- query flow arrows (request/response) -->
  <line x1="782" y1="500" x2="718" y2="500" stroke="#2b3944" stroke-width="2.5" marker-end="url(#flow)"/>
  <line x1="556" y1="500" x2="482" y2="500" stroke="#2b3944" stroke-width="2.5" marker-end="url(#flow)"/>
  <line x1="330" y1="500" x2="262" y2="500" stroke="#2b3944" stroke-width="2.5" marker-end="url(#flow)"/>

  <!-- dashed read-dependency edges from dashboard lambda up to its 4 sources -->
  <path d="M840,452 C700,360 470,250 374,200" fill="none" stroke="#b06a3a" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#read)"/>
  <path d="M858,452 C740,360 660,240 635,190" fill="none" stroke="#b06a3a" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#read)"/>
  <path d="M872,452 L872,190" fill="none" stroke="#b06a3a" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#read)"/>
  <path d="M905,452 C1010,360 1090,250 1118,190" fill="none" stroke="#b06a3a" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#read)"/>

  <text x="632" y="330" font-size="13" fill="#b06a3a" text-anchor="middle" font-style="italic">spc-dashboard-api reads four sources: fog health/thresholds,</text>
  <text x="632" y="349" font-size="13" fill="#b06a3a" text-anchor="middle" font-style="italic">queue depth, spc-processor state, and DynamoDB windows</text>

  <!-- legend -->
  <line x1="96" y1="600" x2="140" y2="600" stroke="#2b3944" stroke-width="2.5" marker-end="url(#flow)"/>
  <text x="150" y="605" font-size="13.5" fill="#2b3944">data flow (ingest and query)</text>
  <line x1="420" y1="600" x2="464" y2="600" stroke="#b06a3a" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#read)"/>
  <text x="474" y="605" font-size="13.5" fill="#b06a3a">read dependency</text>
</svg>
