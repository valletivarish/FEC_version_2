# Real-AWS compose: only the fog node and the ten container sensors run on the
# EC2 host. The processor and dashboard run as Terraform-provisioned Lambdas, and
# DynamoDB/SQS are real managed services, so there is no LocalStack here. The fog
# node publishes to the real SQS queue through the EC2 instance profile via the
# SDK default credential chain, so no endpoint override or static keys are set.
# Port 8000 is published so the dashboard Lambda can reach the fog node's /health
# and /thresholds endpoints over the Elastic IP.
name: fcl-aws

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    environment:
      AWS_REGION: us-east-1
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: fcl-manifest-agg
    ports:
      - "8000:8000"
    restart: unless-stopped

  sensor-temp-1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: storage_temperature
      SITE_ID: container-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-temp-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: storage_temperature
      SITE_ID: container-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-humidity-1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: humidity
      SITE_ID: container-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-humidity-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: humidity
      SITE_ID: container-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-door-1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: door_open_seconds
      SITE_ID: container-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-door-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: door_open_seconds
      SITE_ID: container-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"

  sensor-shock-1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: shock_vibration
      SITE_ID: container-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-shock-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: shock_vibration
      SITE_ID: container-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-co2-1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: co2_level
      SITE_ID: container-1
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "15"

  sensor-co2-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: co2_level
      SITE_ID: container-2
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "16"
