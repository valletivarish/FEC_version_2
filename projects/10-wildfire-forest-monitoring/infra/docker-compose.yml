name: wfm

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4575:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: wfm-station-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: packages handler.js and deploys it as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: wfm-station-agg
      TABLE_NAME: wfm-readings
      LAMBDA_FUNCTION_NAME: wfm-processor
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8089:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: wfm-readings
      SQS_QUEUE_NAME: wfm-station-agg
      LAMBDA_FUNCTION_NAME: wfm-processor
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-temp-s1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: temperature_c
      SITE_ID: station-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-temp-s2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: temperature_c
      SITE_ID: station-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-humidity-s1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: humidity_pct
      SITE_ID: station-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-humidity-s2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: humidity_pct
      SITE_ID: station-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-smoke-s1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: smoke_density_ppm
      SITE_ID: station-1
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "7"

  sensor-smoke-s2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: smoke_density_ppm
      SITE_ID: station-2
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "6"

  sensor-wind-s1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: wind_speed_kmh
      SITE_ID: station-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-wind-s2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: wind_speed_kmh
      SITE_ID: station-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-soil-s1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: soil_moisture_pct
      SITE_ID: station-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-soil-s2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: soil_moisture_pct
      SITE_ID: station-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"
