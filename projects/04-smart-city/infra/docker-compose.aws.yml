# Real-AWS compose: only the fog relay and the city sensors run on the EC2 host. The processor
# and dashboard run as Terraform-provisioned Lambdas, and DynamoDB/SQS are real managed services,
# so there is no LocalStack here. The fog relay publishes to the real SQS queue through the EC2
# instance profile via the SDK default credential chain, so no endpoint override or static keys
# are set. Port 8000 is published so the dashboard Lambda can reach the relay's /health and
# /thresholds endpoints over the Elastic IP.
name: fsc-aws

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    environment:
      AWS_REGION: us-east-1
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: fsc-metrics-agg
    ports:
      - "8000:8000"
    restart: unless-stopped

  sensor-traffic-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: vehicle_count
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-traffic-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: vehicle_count
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-air-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: air_quality_pm25
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-air-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: air_quality_pm25
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-noise-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: noise_level
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-noise-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: noise_level
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-parking-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: parking_occupancy
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-parking-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: parking_occupancy
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"

  sensor-light-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: ambient_light
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "15"

  sensor-light-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: ambient_light
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "16"
