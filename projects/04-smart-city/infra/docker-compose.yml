name: fsc

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4569:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: fsc-metrics-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: deploys Handler.class as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: fsc-metrics-agg
      TABLE_NAME: fsc-readings
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8083:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: fsc-readings
      SQS_QUEUE_NAME: fsc-metrics-agg
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-traffic-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: vehicle_count
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-traffic-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: vehicle_count
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-air-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: air_quality_pm25
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-air-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: air_quality_pm25
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-noise-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: noise_level
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-noise-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: noise_level
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-parking-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: parking_occupancy
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-parking-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: parking_occupancy
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"

  sensor-light-z1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: ambient_light
      SITE_ID: zone-1
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "15"

  sensor-light-z2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: ambient_light
      SITE_ID: zone-2
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "16"
