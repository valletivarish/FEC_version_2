name: sbe

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4577:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: sbe-floor-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: packages handler.py+transform.py as a real Lambda wired to the
  # SQS queue via an event source mapping (see deploy_lambda.py)
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: sbe-floor-agg
      TABLE_NAME: sbe-readings
      LAMBDA_FUNCTION_NAME: sbe-processor
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8091:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: sbe-readings
      SQS_QUEUE_NAME: sbe-floor-agg
      LAMBDA_FUNCTION_NAME: sbe-processor
      FOG_HEALTH_URL: http://fog:8000/health
      FOG_THRESHOLDS_URL: http://fog:8000/thresholds
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-energy-f1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: energy_consumption_kw
      SITE_ID: floor-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-energy-f2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: energy_consumption_kw
      SITE_ID: floor-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-co2-f1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: co2_ppm
      SITE_ID: floor-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-co2-f2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: co2_ppm
      SITE_ID: floor-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-occupancy-f1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: occupancy_count
      SITE_ID: floor-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-occupancy-f2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: occupancy_count
      SITE_ID: floor-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"

  sensor-hvac-f1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: hvac_temp_c
      SITE_ID: floor-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-hvac-f2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: hvac_temp_c
      SITE_ID: floor-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-water-f1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: water_usage_lpm
      SITE_ID: floor-1
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "15"

  sensor-water-f2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: water_usage_lpm
      SITE_ID: floor-2
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "16"
