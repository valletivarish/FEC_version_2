<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Public Transit Fleet Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1>Transit Fleet Monitor</h1>
        <p class="brand-sub">Two depots, live &mdash; bus telemetry pipeline</p>
      </div>
    </div>
    <div id="health-strip" class="health-strip"></div>
  </header>

  <section id="alert-banner" class="alert-banner" hidden></section>

  <main class="content">
    <section aria-label="Depot A roster">
      <h2 class="section-title">Depot A</h2>
      <div id="depot-a-cards" class="depot-cards"></div>
    </section>

    <section aria-label="Depot B roster">
      <h2 class="section-title">Depot B</h2>
      <div id="depot-b-cards" class="depot-cards"></div>
    </section>

    <section aria-label="Trends">
      <h2 class="section-title">Trends</h2>
      <div id="trend-grid" class="trend-grid"></div>
    </section>
  </main>

  <footer class="pipeline-footer">
    <span id="backend-stats" class="backend-stats"></span>
  </footer>

  <script id="app" src="/static/dashboard.js" data-api-base="__API_BASE__"></script>
</body>
</html>
