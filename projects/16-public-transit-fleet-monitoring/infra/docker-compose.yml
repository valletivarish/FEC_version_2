name: ptf

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4581:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: ptf-depot-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: deploys TransitHandler as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: ptf-depot-agg
      TABLE_NAME: ptf-readings
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8095:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: ptf-readings
      SQS_QUEUE_NAME: ptf-depot-agg
      LAMBDA_FUNCTION_NAME: ptf-processor
    depends_on:
      - localstack
    restart: unless-stopped

  depota-enginetemp:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: engine_temp_c
      SITE_ID: depot-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  depota-brakewear:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: brake_pad_wear_pct
      SITE_ID: depot-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "9"

  depota-passengers:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: passenger_count
      SITE_ID: depot-a
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "7"

  depota-fuel:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fuel_level_pct
      SITE_ID: depot-a
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "10"

  depota-speed:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gps_speed_kmh
      SITE_ID: depot-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "6"

  depotb-enginetemp:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: engine_temp_c
      SITE_ID: depot-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  depotb-brakewear:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: brake_pad_wear_pct
      SITE_ID: depot-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  depotb-passengers:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: passenger_count
      SITE_ID: depot-b
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "8"

  depotb-fuel:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fuel_level_pct
      SITE_ID: depot-b
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "11"

  depotb-speed:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gps_speed_kmh
      SITE_ID: depot-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "7"
