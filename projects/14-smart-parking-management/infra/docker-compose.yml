name: spm

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4579:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: spm-lot-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: packages handler.py+transform.py as a real Lambda wired to the
  # SQS queue via an event source mapping (see deploy_lambda.py)
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: spm-lot-agg
      TABLE_NAME: spm-readings
      LAMBDA_FUNCTION_NAME: spm-processor
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8093:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: spm-readings
      SQS_QUEUE_NAME: spm-lot-agg
      LAMBDA_FUNCTION_NAME: spm-processor
      FOG_HEALTH_URL: http://fog:8000/health
      FOG_THRESHOLDS_URL: http://fog:8000/thresholds
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-occupied-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: occupied_spaces
      SITE_ID: lot-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-occupied-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: occupied_spaces
      SITE_ID: lot-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-entry-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: entry_rate_per_min
      SITE_ID: lot-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-entry-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: entry_rate_per_min
      SITE_ID: lot-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-exit-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: exit_rate_per_min
      SITE_ID: lot-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "12"

  sensor-exit-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: exit_rate_per_min
      SITE_ID: lot-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "13"

  sensor-dwell-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: avg_dwell_time_min
      SITE_ID: lot-a
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "14"

  sensor-dwell-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: avg_dwell_time_min
      SITE_ID: lot-b
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "15"

  sensor-gatefault-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gate_fault_events
      SITE_ID: lot-a
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "16"

  sensor-gatefault-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gate_fault_events
      SITE_ID: lot-b
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "17"
