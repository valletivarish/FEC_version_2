name: bam

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4591:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: bam-apiary-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: packages handler.js and deploys it as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: bam-apiary-agg
      TABLE_NAME: bam-readings
      LAMBDA_FUNCTION_NAME: bam-processor
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8105:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: bam-readings
      SQS_QUEUE_NAME: bam-apiary-agg
      LAMBDA_FUNCTION_NAME: bam-processor
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-weight-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: hive_weight_kg
      SITE_ID: apiary-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "12"

  sensor-weight-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: hive_weight_kg
      SITE_ID: apiary-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "13"

  sensor-temp-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_hive_temp_c
      SITE_ID: apiary-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-temp-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_hive_temp_c
      SITE_ID: apiary-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-humidity-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_humidity_pct
      SITE_ID: apiary-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-humidity-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_humidity_pct
      SITE_ID: apiary-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-buzz-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: acoustic_buzz_frequency_hz
      SITE_ID: apiary-a
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "6"

  sensor-buzz-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: acoustic_buzz_frequency_hz
      SITE_ID: apiary-b
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "7"

  sensor-traffic-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: entrance_traffic_count
      SITE_ID: apiary-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-traffic-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: entrance_traffic_count
      SITE_ID: apiary-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"
