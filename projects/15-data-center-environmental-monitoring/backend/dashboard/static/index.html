<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Left blank for local dev, where the dashboard server itself reverse-proxies
       /api/* (see backend/dashboard/apiGatewayProxy.js). A static deployment served
       from its own origin (e.g. S3) has no such proxy in front of it, so this is set
       to the deployed API Gateway's invoke URL and dashboard.js reads it directly. -->
  <meta name="api-base" content="">
  <title>Data Center Environmental Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1>Data Center Environmental Monitor</h1>
        <p class="brand-sub">Server Hall 1 &amp; Server Hall 2 &mdash; temperature, humidity, airflow, power, dust</p>
      </div>
    </div>
    <div id="health-strip" class="health-strip"></div>
  </header>

  <section id="alert-banner" class="alert-banner" hidden></section>

  <main class="content">
    <section aria-label="Hall readings">
      <h2 class="section-title">Hall Readings</h2>
      <div id="hall-grid" class="hall-grid"></div>
    </section>

    <section aria-label="Trends">
      <h2 class="section-title">Window-Average Trends</h2>
      <div id="trend-grid" class="trend-grid"></div>
    </section>
  </main>

  <footer class="pipeline-footer">
    <span id="backend-stats" class="backend-stats"></span>
  </footer>

  <script src="/static/dashboard.js"></script>
</body>
</html>
