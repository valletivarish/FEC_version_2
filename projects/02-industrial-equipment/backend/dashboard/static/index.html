<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plant Floor Monitor — Predictive Maintenance</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
  <header class="board-head">
    <div class="board-id">
      <span class="board-tag">LINE STATUS BOARD</span>
      <h1>Plant Floor Monitor</h1>
      <p class="board-sub">Predictive maintenance &mdash; five machine sensors, two production lines</p>
    </div>
    <div id="plant-stats" class="plant-stats"></div>
  </header>

  <section id="alarm-strip" class="alarm-strip"></section>

  <main id="nameplate-grid" class="nameplate-grid">
    <article class="nameplate" data-sensor="vibration">
      <div class="plate-head">
        <span class="plate-dot vibration"></span>
        <h2>Vibration</h2>
        <span class="plate-unit">mm/s</span>
      </div>
      <div class="dial-row"></div>
      <div class="trend-row"><canvas class="trend"></canvas></div>
      <table class="site-table"><tbody></tbody></table>
    </article>

    <article class="nameplate" data-sensor="motor_temperature">
      <div class="plate-head">
        <span class="plate-dot motor_temperature"></span>
        <h2>Motor Temp</h2>
        <span class="plate-unit">&deg;C</span>
      </div>
      <div class="dial-row"></div>
      <div class="trend-row"><canvas class="trend"></canvas></div>
      <table class="site-table"><tbody></tbody></table>
    </article>

    <article class="nameplate" data-sensor="bearing_acoustic">
      <div class="plate-head">
        <span class="plate-dot bearing_acoustic"></span>
        <h2>Bearing Acoustic</h2>
        <span class="plate-unit">dB</span>
      </div>
      <div class="dial-row"></div>
      <div class="trend-row"><canvas class="trend"></canvas></div>
      <table class="site-table"><tbody></tbody></table>
    </article>

    <article class="nameplate" data-sensor="rotation_speed">
      <div class="plate-head">
        <span class="plate-dot rotation_speed"></span>
        <h2>Rotation Speed</h2>
        <span class="plate-unit">RPM</span>
      </div>
      <div class="dial-row"></div>
      <div class="trend-row"><canvas class="trend"></canvas></div>
      <table class="site-table"><tbody></tbody></table>
    </article>

    <article class="nameplate" data-sensor="power_draw">
      <div class="plate-head">
        <span class="plate-dot power_draw"></span>
        <h2>Power Draw</h2>
        <span class="plate-unit">kW</span>
      </div>
      <div class="dial-row"></div>
      <div class="trend-row"><canvas class="trend"></canvas></div>
      <table class="site-table"><tbody></tbody></table>
    </article>
  </main>

  <footer id="system-status" class="system-status"></footer>

  <script id="app" src="/static/dashboard.js" data-api-base="__API_BASE__"></script>
</body>
</html>
