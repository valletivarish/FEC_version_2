name: fei

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4567:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: fei-sensor-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: deploys handler.py as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: fei-sensor-agg
      TABLE_NAME: fei-readings
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8081:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: fei-readings
      SQS_QUEUE_NAME: fei-sensor-agg
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-vibration:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: vibration
      SITE_ID: line-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-motor-temp:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: motor_temperature
      SITE_ID: line-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-motor-temp-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: motor_temperature
      SITE_ID: line-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-acoustic:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: bearing_acoustic
      SITE_ID: line-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "12"

  sensor-rotation:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: rotation_speed
      SITE_ID: line-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-power:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: power_draw
      SITE_ID: line-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "16"
