# Real-AWS compose: only the fog node and the equipment sensors run on the EC2 host. The
# processor and dashboard run as Terraform-provisioned Lambdas, and DynamoDB/SQS are real
# managed services, so there is no LocalStack here. The fog node publishes to the real SQS
# queue through the EC2 instance profile via the SDK default credential chain, so no endpoint
# override or static keys are set. Port 8000 is published so the dashboard Lambda can reach
# the fog node's /health and /thresholds endpoints over the Elastic IP.
name: fei-aws

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    environment:
      AWS_REGION: us-east-1
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: fei-sensor-agg
    ports:
      - "8000:8000"
    restart: unless-stopped

  sensor-vibration:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: vibration
      SITE_ID: line-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-motor-temp-1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: motor_temperature
      SITE_ID: line-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-motor-temp-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: motor_temperature
      SITE_ID: line-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-acoustic:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: bearing_acoustic
      SITE_ID: line-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "12"

  sensor-rotation:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: rotation_speed
      SITE_ID: line-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-power:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: power_draw
      SITE_ID: line-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "16"
