name: fec

# Real-AWS variant of docker-compose.yml: runs the fog node and every sensor
# container against the live account instead of LocalStack. No
# AWS_ACCESS_KEY_ID or AWS_ENDPOINT_URL is set anywhere in this file, so
# publisher.py's boto3.client(...) call falls through to the SDK's default
# credential provider chain and picks up this EC2 instance's attached
# instance profile automatically. Neither localstack, dashboard, nor the
# one-shot processor job appear here: the DynamoDB table and both Lambdas
# are provisioned directly against the account instead.

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: us-east-1
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: fec-agri-agg
    restart: unless-stopped

  sensor-soil:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: soil_moisture
      SITE_ID: field-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-soil-2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: soil_moisture
      SITE_ID: field-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-temp:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: temperature
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-humidity:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: humidity
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "12"

  sensor-light:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: light_intensity
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-rain:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: rainfall
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "16"
