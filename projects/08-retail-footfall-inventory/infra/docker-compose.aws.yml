# Real-AWS compose: only the fog node and the store sensors run on the EC2 host. The processor
# and dashboard run as Terraform-provisioned Lambdas, and DynamoDB/SQS are real managed services,
# so there is no LocalStack here. The fog node publishes to the real SQS queue through the EC2
# instance profile via the SDK default credential chain, so no endpoint override or static keys
# are set. Port 8000 is published so the dashboard Lambda can reach the fog node's /health and
# /thresholds endpoints over the Elastic IP.
name: rfi-aws

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    environment:
      AWS_REGION: us-east-1
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: rfi-store-agg
    ports:
      - "8000:8000"
    restart: unless-stopped

  store1-footfall:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: footfall_count
      SITE_ID: store-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  store1-stock:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: shelf_stock_pct
      SITE_ID: store-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "9"

  store1-fridge:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fridge_temp_c
      SITE_ID: store-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  store1-queue:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: queue_length
      SITE_ID: store-1
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "7"

  store1-energy:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: energy_draw_kw
      SITE_ID: store-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  store2-footfall:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: footfall_count
      SITE_ID: store-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  store2-stock:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: shelf_stock_pct
      SITE_ID: store-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  store2-fridge:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fridge_temp_c
      SITE_ID: store-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "11"

  store2-queue:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: queue_length
      SITE_ID: store-2
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "8"

  store2-energy:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: energy_draw_kw
      SITE_ID: store-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"
