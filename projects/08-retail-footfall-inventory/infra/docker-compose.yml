name: rfi

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4573:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: rfi-store-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: deploys StoreHandler as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: rfi-store-agg
      TABLE_NAME: rfi-readings
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8087:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: rfi-readings
      SQS_QUEUE_NAME: rfi-store-agg
      LAMBDA_FUNCTION_NAME: rfi-processor
    depends_on:
      - localstack
    restart: unless-stopped

  store1-footfall:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: footfall_count
      SITE_ID: store-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  store1-stock:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: shelf_stock_pct
      SITE_ID: store-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "9"

  store1-fridge:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fridge_temp_c
      SITE_ID: store-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  store1-queue:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: queue_length
      SITE_ID: store-1
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "7"

  store1-energy:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: energy_draw_kw
      SITE_ID: store-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  store2-footfall:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: footfall_count
      SITE_ID: store-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  store2-stock:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: shelf_stock_pct
      SITE_ID: store-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  store2-fridge:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fridge_temp_c
      SITE_ID: store-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "11"

  store2-queue:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: queue_length
      SITE_ID: store-2
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "8"

  store2-energy:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: energy_draw_kw
      SITE_ID: store-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"
