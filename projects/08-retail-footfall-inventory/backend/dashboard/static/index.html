<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retail Footfall &amp; Inventory Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div>
        <h1>Retail Footfall &amp; Inventory Monitor</h1>
        <p class="brand-sub">Two-store live pipeline &mdash; footfall, stock, and environment</p>
      </div>
    </div>
    <div id="health-strip" class="health-strip"></div>
  </header>

  <section id="alert-banner" class="alert-banner" hidden></section>

  <main class="content">
    <section aria-label="Key performance indicators">
      <h2 class="section-title">Today at a glance</h2>
      <div id="kpi-grid" class="kpi-grid"></div>
    </section>

    <section aria-label="Per-store detail">
      <h2 class="section-title">Store detail</h2>
      <div id="store-grid" class="store-grid"></div>
    </section>

    <section aria-label="Trends">
      <h2 class="section-title">Trends</h2>
      <div id="trend-grid" class="trend-grid"></div>
    </section>
  </main>

  <footer class="pipeline-footer">
    <span id="backend-stats" class="backend-stats"></span>
  </footer>

  <script id="app" src="/static/dashboard.js" data-api-base="__API_BASE__"></script>
</body>
</html>
