<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elevator &amp; Escalator Fleet Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
  <div class="hazard-strip" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">EEF</span>
      <div>
        <h1>Elevator &amp; Escalator Fleet Monitor</h1>
        <p class="brand-sub">Two towers &mdash; motor, door, cab vibration, load &amp; speed, live</p>
      </div>
    </div>
    <div id="health-strip" class="health-strip"></div>
  </header>

  <section id="alert-banner" class="alert-banner" hidden></section>

  <main class="content">
    <section aria-label="Tower readings">
      <h2 class="section-title">Tower Readings</h2>
      <div id="tower-grid" class="tower-grid"></div>
    </section>

    <section aria-label="Trends">
      <h2 class="section-title">Window-Average Trends</h2>
      <div id="trend-grid" class="trend-grid"></div>
    </section>
  </main>

  <footer class="pipeline-footer">
    <span id="backend-stats" class="backend-stats"></span>
  </footer>

  <script src="/static/dashboard.js"></script>
</body>
</html>
