name: swm

x-aws-env: &aws-env
  AWS_REGION: us-east-1

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    ports:
      - "8100:8000"
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: swm-district-agg
    restart: unless-stopped

  sensor-fill-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fill_level_pct
      SITE_ID: district-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-fill-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fill_level_pct
      SITE_ID: district-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-temp-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_temp_c
      SITE_ID: district-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-temp-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_temp_c
      SITE_ID: district-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-gas-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gas_level_ppm
      SITE_ID: district-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "7"

  sensor-gas-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gas_level_ppm
      SITE_ID: district-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "6"

  sensor-weight-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: bin_weight_kg
      SITE_ID: district-a
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-weight-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: bin_weight_kg
      SITE_ID: district-b
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"

  sensor-lid-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: lid_open_count
      SITE_ID: district-a
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "6"

  sensor-lid-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: lid_open_count
      SITE_ID: district-b
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "5"
