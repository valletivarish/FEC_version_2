name: swm

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4587:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: swm-district-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: packages handler.js and deploys it as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: swm-district-agg
      TABLE_NAME: swm-readings
      LAMBDA_FUNCTION_NAME: swm-processor
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8101:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: swm-readings
      SQS_QUEUE_NAME: swm-district-agg
      LAMBDA_FUNCTION_NAME: swm-processor
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-fill-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fill_level_pct
      SITE_ID: district-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-fill-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: fill_level_pct
      SITE_ID: district-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-temp-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_temp_c
      SITE_ID: district-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-temp-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: internal_temp_c
      SITE_ID: district-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-gas-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gas_level_ppm
      SITE_ID: district-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "7"

  sensor-gas-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: gas_level_ppm
      SITE_ID: district-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "6"

  sensor-weight-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: bin_weight_kg
      SITE_ID: district-a
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-weight-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: bin_weight_kg
      SITE_ID: district-b
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"

  sensor-lid-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: lid_open_count
      SITE_ID: district-a
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "6"

  sensor-lid-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: lid_open_count
      SITE_ID: district-b
      SAMPLE_INTERVAL: "1"
      DISPATCH_INTERVAL: "5"
