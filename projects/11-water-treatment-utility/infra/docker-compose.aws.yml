# Real-AWS compose: the fog node and ten sensor containers only. No
# LocalStack, no processor and no dashboard (those run as Lambda functions
# provisioned by Terraform). The fog node publishes to the real SQS queue
# using the EC2 instance profile through the SDK's default credential chain,
# so no endpoint override and no static credentials are set here. Port 8000
# is published so the dashboard Lambda can reach the fog health and
# thresholds endpoints over the instance's Elastic IP.
name: wtu-aws

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    environment:
      AWS_REGION: us-east-1
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: wtu-plant-agg
    ports:
      - "8000:8000"
    restart: unless-stopped

  sensor-turbidity-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: turbidity_ntu
      SITE_ID: plant-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-turbidity-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: turbidity_ntu
      SITE_ID: plant-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-ph-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: ph_level
      SITE_ID: plant-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-ph-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: ph_level
      SITE_ID: plant-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-chlorine-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: chlorine_ppm
      SITE_ID: plant-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "9"

  sensor-chlorine-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: chlorine_ppm
      SITE_ID: plant-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-flow-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: flow_rate_lps
      SITE_ID: plant-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "12"

  sensor-flow-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: flow_rate_lps
      SITE_ID: plant-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "13"

  sensor-pressure-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: pressure_bar
      SITE_ID: plant-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "11"

  sensor-pressure-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: pressure_bar
      SITE_ID: plant-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "14"
