<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Water Treatment Utility Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1>Water Treatment Utility Monitor</h1>
        <p class="brand-sub">Two treatment plants &mdash; turbidity, pH, chlorination, flow &amp; pressure, live</p>
      </div>
    </div>
    <div id="health-strip" class="health-strip"></div>
  </header>

  <section id="alert-banner" class="alert-banner" hidden></section>

  <main class="content">
    <section aria-label="Plant readings">
      <h2 class="section-title">Plant Readings</h2>
      <div class="matrix-wrap">
        <table id="matrix-table" class="matrix-table">
          <thead>
            <tr>
              <th class="row-head-col" scope="col">Reading</th>
              <th scope="col">Plant 1</th>
              <th scope="col">Plant 2</th>
            </tr>
          </thead>
          <tbody id="matrix-body"></tbody>
        </table>
      </div>
      <div id="compliance-strip" class="compliance-strip"></div>
    </section>

    <section aria-label="Trends">
      <h2 class="section-title">Window-Average Trends</h2>
      <div id="trend-grid" class="trend-grid"></div>
    </section>
  </main>

  <footer class="pipeline-footer">
    <span id="backend-stats" class="backend-stats"></span>
  </footer>

  <script src="/static/dashboard.js"></script>
</body>
</html>
