# Real-AWS compose: only the fog node and the ten bedside vital sensors run on
# the EC2 host. The processor and dashboard run as Terraform-provisioned Lambdas,
# and DynamoDB/SQS are real managed services, so there is no LocalStack here. The
# fog node publishes to the real SQS queue through the EC2 instance profile via
# the SDK default credential chain, so no endpoint override or static keys are
# set. Port 8000 is published so the dashboard Lambda can reach the fog node's
# /health and /thresholds endpoints over the Elastic IP.
name: fpv-aws

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  fog:
    build:
      context: ../fog
    environment:
      AWS_REGION: us-east-1
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: fpv-vitals-agg
    ports:
      - "8000:8000"
    restart: unless-stopped

  sensor-hr-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: heart_rate
      SITE_ID: patient-1
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-hr-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: heart_rate
      SITE_ID: patient-2
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-spo2-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: spo2
      SITE_ID: patient-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-spo2-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: spo2
      SITE_ID: patient-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-temp-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: body_temperature
      SITE_ID: patient-1
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "12"

  sensor-temp-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: body_temperature
      SITE_ID: patient-2
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "13"

  sensor-resp-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: respiration_rate
      SITE_ID: patient-1
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"

  sensor-resp-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: respiration_rate
      SITE_ID: patient-2
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "11"

  sensor-bp-p1:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: systolic_bp
      SITE_ID: patient-1
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "15"

  sensor-bp-p2:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: systolic_bp
      SITE_ID: patient-2
      SAMPLE_INTERVAL: "5"
      DISPATCH_INTERVAL: "16"
