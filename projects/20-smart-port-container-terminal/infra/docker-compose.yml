name: spc

x-aws-env: &aws-env
  AWS_ENDPOINT_URL: http://localstack:4566
  AWS_REGION: eu-west-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-sensor: &sensor
  build:
    context: ../sensors
  environment: &sensor-env
    FOG_URL: http://fog:8000/ingest
  depends_on:
    - fog
  restart: unless-stopped

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4585:4566"
    environment:
      SERVICES: sqs,dynamodb,lambda
      DEBUG: "0"
      LAMBDA_KEEPALIVE_MS: "0"
    volumes:
      - ./localstack/init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock

  fog:
    build:
      context: ../fog
    environment:
      <<: *aws-env
      WINDOW_SECONDS: "10"
      SQS_QUEUE_NAME: spc-berth-agg
    depends_on:
      - localstack
    restart: unless-stopped

  # one-shot: deploys TerminalHandler as a real Lambda wired to the SQS queue
  processor:
    build:
      context: ../backend/processor
    environment:
      <<: *aws-env
      SQS_QUEUE_NAME: spc-berth-agg
      TABLE_NAME: spc-readings
      LAMBDA_FUNCTION_NAME: spc-processor
    depends_on:
      - localstack
    restart: "no"

  dashboard:
    build:
      context: ../backend/dashboard
    ports:
      - "8099:8000"
    environment:
      <<: *aws-env
      TABLE_NAME: spc-readings
      SQS_QUEUE_NAME: spc-berth-agg
      LAMBDA_FUNCTION_NAME: spc-processor
    depends_on:
      - localstack
    restart: unless-stopped

  sensor-crane-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: crane_load_kg
      SITE_ID: berth-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "8"

  sensor-crane-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: crane_load_kg
      SITE_ID: berth-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "9"

  sensor-stack-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: container_stack_height
      SITE_ID: berth-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "12"

  sensor-stack-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: container_stack_height
      SITE_ID: berth-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "13"

  sensor-wind-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: wind_speed_knots
      SITE_ID: berth-a
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "10"

  sensor-wind-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: wind_speed_knots
      SITE_ID: berth-b
      SAMPLE_INTERVAL: "2"
      DISPATCH_INTERVAL: "11"

  sensor-occupancy-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: berth_occupancy_pct
      SITE_ID: berth-a
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "14"

  sensor-occupancy-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: berth_occupancy_pct
      SITE_ID: berth-b
      SAMPLE_INTERVAL: "4"
      DISPATCH_INTERVAL: "15"

  sensor-reefer-a:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: reefer_temp_c
      SITE_ID: berth-a
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "9"

  sensor-reefer-b:
    <<: *sensor
    environment:
      <<: *sensor-env
      SENSOR_TYPE: reefer_temp_c
      SITE_ID: berth-b
      SAMPLE_INTERVAL: "3"
      DISPATCH_INTERVAL: "10"
