<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offshore Wind Farm Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
  <header class="deck-header">
    <div class="deck-title">
      <span class="deck-mark" aria-hidden="true"></span>
      <div>
        <h1>North Bank Offshore Array</h1>
        <p class="deck-subtitle">Turbine condition monitoring &mdash; fog gateway telemetry</p>
      </div>
    </div>
    <dl id="fleet-readout" class="fleet-readout"></dl>
  </header>

  <section id="alert-strip" class="alert-strip calm">All turbines within normal operating envelope</section>

  <main>
    <section class="farm-section">
      <h2 class="section-label">Farm Layout</h2>
      <div id="farm-grid" class="farm-grid"></div>
    </section>

    <section class="trend-section">
      <h2 class="section-label">Power Output &mdash; Cross-Turbine Trend</h2>
      <div class="trend-panel">
        <canvas id="power-trend-chart"></canvas>
      </div>
    </section>
  </main>

  <footer id="pipeline-footer" class="pipeline-footer"></footer>

  <!--
    Deploy-time API base. The token below is sed-substituted for the real
    API Gateway origin when the static assets are pushed to S3 (left
    unsubstituted here for local dev, where the Express app serves both the
    API and these static files from one origin). This runs as a plain
    inline script executed before dashboard.js loads, so dashboard.js just
    reads the resulting global -- no separate config file/request, no
    data-attribute, and no meta/link/style tag involved.
  -->
  <script>
    window.API_BASE = "__API_BASE__";
  </script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
